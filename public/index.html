<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Douban eBook ++ — 一键直达电子书平台</title>
  <meta name="description" content="输入书名或豆瓣链接，一键获取微信读书、豆瓣阅读、得到、多看、蜗牛、Z-Library、Anna's Archive 七大平台的在线阅读入口。">
  <link rel="stylesheet" href="css/main.css">
</head>
<body>
  <div class="app">
    <!-- 顶栏 -->
    <header class="app-header">
      <div class="brand">
        <div class="brand-mark">DB+</div>
        <div class="brand-text">
          <h1>Douban eBook ++</h1>
          <p>一键直达 7 个电子书平台</p>
        </div>
      </div>
      <div class="theme-toggle" role="group" aria-label="主题切换">
        <button class="theme-btn" data-theme="light" title="浅色" aria-label="浅色主题">☀</button>
        <button class="theme-btn" data-theme="dark" title="深色" aria-label="深色主题">☾</button>
        <button class="theme-btn" data-theme="system" title="跟随系统" aria-label="跟随系统">⌂</button>
      </div>
    </header>

    <!-- 搜索卡 -->
    <section class="search-card">
      <div class="search-title">找到这本书的电子版</div>
      <div class="search-sub">粘贴豆瓣链接，或输入书名 / ISBN，自动匹配 7 个平台的在线阅读入口</div>
      <div class="search-row">
        <input id="searchInput" class="search-input" type="text"
          placeholder="如：https://book.douban.com/subject/2567698/ 或 三体 或 9787536692930"
          autocomplete="off" spellcheck="false">
        <button id="searchBtn" class="search-btn" type="button">搜索</button>
      </div>
      <button id="advToggle" class="advanced-toggle" type="button">
        <span class="chev">▾</span> 补充 ISBN / 作者（可选）
      </button>
      <div id="advFields" class="advanced-fields">
        <div class="field">
          <label for="isbnInput">ISBN</label>
          <input id="isbnInput" type="text" placeholder="9787536692930" autocomplete="off">
        </div>
        <div class="field">
          <label for="authorInput">作者</label>
          <input id="authorInput" type="text" placeholder="刘慈欣" autocomplete="off">
        </div>
      </div>
    </section>

    <!-- 结果区 -->
    <section class="results-section">
      <div id="resultsHead" class="results-head" style="display:none">
        <h2>在线阅读入口</h2>
        <div id="resultsMeta" class="meta"></div>
      </div>
      <div id="resultsBody">
        <div class="empty-state">
          <span class="emoji">📚</span>
          <p>输入书名或粘贴豆瓣链接，<br>立即获取 7 个电子书平台的直达入口。</p>
          <div class="tip">支持：微信读书 · 豆瓣阅读 · 得到 · 多看 · 蜗牛 · Z-Library · Anna's Archive</div>
        </div>
      </div>
    </section>

    <!-- 页脚 -->
    <footer class="app-footer">
      <span>Douban eBook ++ Web v1.0</span>
      <a href="settings.html">镜像设置</a>
      <span>·</span>
      <span>MIT © BitBetter</span>
    </footer>
  </div>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="js/platforms.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
